
{% block extra_js %}
<!-- SweetAlert2 CDN -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        console.log("DOM fully loaded and parsed for Pesanan Dibatalkan");

        // Get CSRF token
        const csrfToken = document.querySelector("[name=csrfmiddlewaretoken]").value;
        console.log("CSRF Token:", csrfToken ? "Found" : "Not found");

        const resetDataBtn = document.getElementById("resetDataBtn");

        // Reset Data button click
        if (resetDataBtn) {
            resetDataBtn.addEventListener("click", function(e) {
                e.preventDefault(); // Prevent default form submission
                Swal.fire({
                    title: "Konfirmasi Reset Data",
                    html: "<div class=	\'alert alert-danger	\'><i class=	\'bi bi-exclamation-triangle-fill me-2	\'></i>Apakah Anda yakin ingin menghapus <strong>semua data pesanan dibatalkan</strong>? Tindakan ini tidak dapat dibatalkan.</div>",
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonColor: "#d33",
                    cancelButtonColor: "#3085d6",
                    confirmButtonText: "Ya, Hapus Semua!",
                    cancelButtonText: "Batal"
                }).then((result) => {
                    if (result.isConfirmed) {
                        // If confirmed, submit the reset form
                        document.getElementById("resetForm").submit();
                    }
                });
            });
        }

        // Delete Cancelled Order button click handler (using event delegation)
        document.addEventListener("click", function(e) {
            const deleteBtn = e.target.closest(".delete-cancelled-order-btn"); // Use specific class
            if (deleteBtn) {
                const button = deleteBtn;
                const itemId = button.getAttribute("data-item-id");
                const row = button.closest("tr");
                const orderNumberElement = row.querySelector("td:nth-child(2)"); // Assuming Nomor Pesanan is 2nd column
                const orderNumber = orderNumberElement ? orderNumberElement.textContent.trim() : "pesanan ini";

                Swal.fire({
                    title: "Konfirmasi Hapus",
                    text: `Apakah Anda yakin ingin menghapus pesanan dibatalkan \"${orderNumber}\"? Tindakan ini tidak dapat dibatalkan.`,
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonColor: "#d33",
                    cancelButtonColor: "#3085d6",
                    confirmButtonText: "Ya, Hapus!",
                    cancelButtonText: "Batal"
                }).then((result) => {
                    if (result.isConfirmed) {
                        Swal.fire({ title: "Menghapus pesanan...", allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                        fetch(`/api/delete-cancelled-order/${itemId}/`, { // Use correct endpoint
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "X-CSRFToken": csrfToken
                            },
                            // No body needed if just using URL parameter for ID
                        })
                        .then(response => response.json())
                        .then(data => {
                            Swal.close();
                            if (data.status === "success") {
                                row.style.transition = "opacity 0.5s ease";
                                row.style.opacity = "0";
                                setTimeout(() => {
                                    row.remove();
                                    // Check if table is empty and add "no data" row if needed
                                    const tableBody = document.querySelector("table tbody");
                                    if (tableBody && tableBody.querySelectorAll("tr").length === 0) {
                                        const noDataRow = document.createElement("tr");
                                        noDataRow.innerHTML = "<td colspan=\"7\" class=\"text-center\">Tidak ada data pesanan dibatalkan</td>"; // Adjusted colspan
                                        tableBody.appendChild(noDataRow);
                                    }
                                }, 500);
                                Swal.fire("Berhasil", "Pesanan dibatalkan berhasil dihapus", "success");
                            } else {
                                Swal.fire("Gagal", data.message || "Gagal menghapus pesanan dibatalkan", "error");
                            }
                        })
                        .catch(error => {
                            console.error("Error deleting cancelled order:", error);
                            Swal.close();
                            Swal.fire("Gagal", "Terjadi kesalahan saat menghubungi server", "error");
                        });
                    }
                });
            }
        });
    });
</script>
{% endblock %}

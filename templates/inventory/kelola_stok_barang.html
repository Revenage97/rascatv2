
{% block extra_js %}
<!-- SweetAlert2 CDN -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM fully loaded and parsed for Kelola Stok Barang');

        // Get CSRF token
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        console.log('CSRF Token:', csrfToken ? 'Found' : 'Not found');

        const sendToTelegramBtn = document.getElementById('sendToTelegramBtn');
        const resetDataBtn = document.getElementById('resetDataBtn');
        const toastEl = document.getElementById('notificationToast');
        const toast = toastEl ? new bootstrap.Toast(toastEl) : null;
        const toastMessage = document.getElementById('toastMessage');

        // Select All functionality
        const selectAllCheckbox = document.getElementById('selectAll');
        if (selectAllCheckbox) {
            selectAllCheckbox.addEventListener('change', function() {
                const isChecked = this.checked;
                document.querySelectorAll('.item-checkbox').forEach(function(checkbox) {
                    checkbox.checked = isChecked;
                });
                updateSendButtonState();
            });
        }

        // Individual checkbox change
        document.addEventListener('change', function(e) {
            if (e.target && e.target.classList.contains('item-checkbox')) {
                updateSendButtonState();
                const allCheckboxes = document.querySelectorAll('.item-checkbox');
                const checkedCheckboxes = document.querySelectorAll('.item-checkbox:checked');
                if (selectAllCheckbox) {
                    selectAllCheckbox.checked = allCheckboxes.length > 0 && allCheckboxes.length === checkedCheckboxes.length;
                }
            }
        });

        // Update send button state
        function updateSendButtonState() {
            const checkedItems = document.querySelectorAll('.item-checkbox:checked');
            if (sendToTelegramBtn) {
                sendToTelegramBtn.disabled = checkedItems.length === 0;
            }
        }
        updateSendButtonState(); // Initial check

        // Send to Telegram button click
        if (sendToTelegramBtn) {
            sendToTelegramBtn.addEventListener('click', function() {
                const selectedItems = Array.from(document.querySelectorAll('.item-checkbox:checked')).map(cb => cb.value);
                if (selectedItems.length === 0) {
                    Swal.fire('Peringatan', 'Pilih setidaknya satu item untuk dikirim', 'warning');
                    return;
                }

                // Disable button and show loading state
                this.disabled = true;
                const originalContent = this.innerHTML;
                this.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Mengirim...';

                fetch('/api/send-to-telegram/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ item_ids: selectedItems })
                })
                .then(response => response.json())
                .then(data => {
                    this.disabled = false;
                    this.innerHTML = originalContent;
                    if (data.status === 'success') {
                        Swal.fire('Berhasil', 'Data berhasil dikirim ke Telegram', 'success');
                    } else {
                        Swal.fire('Gagal', data.message || 'Gagal mengirim data ke Telegram', 'error');
                    }
                })
                .catch(error => {
                    this.disabled = false;
                    this.innerHTML = originalContent;
                    console.error('Error sending to Telegram:', error);
                    Swal.fire('Gagal', 'Terjadi kesalahan saat mengirim data', 'error');
                });
            });
        }

        // Reset Data button click
        if (resetDataBtn) {
            resetDataBtn.addEventListener('click', function() {
                Swal.fire({
                    title: 'Konfirmasi Reset Data',
                    html: "<div class='alert alert-danger'><i class='bi bi-exclamation-triangle-fill me-2'></i>Apakah Anda yakin ingin menghapus <strong>semua data barang</strong>? Tindakan ini akan menghapus data dari Kelola Stok Barang, Kelola Harga, dan Data Exp Produk secara permanen dan tidak bisa dibatalkan.</div>",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#3085d6',
                    confirmButtonText: 'Ya, Hapus Semua!',
                    cancelButtonText: 'Batal'
                }).then((result) => {
                    if (result.isConfirmed) {
                        Swal.fire({ title: 'Menghapus data...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                        fetch('/api/reset-all-items/', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': csrfToken
                            }
                        })
                        .then(response => response.json())
                        .then(data => {
                            Swal.close();
                            if (data.status === 'success') {
                                Swal.fire('Berhasil', 'Semua data barang berhasil direset.', 'success').then(() => {
                                    window.location.reload();
                                });
                            } else {
                                Swal.fire('Gagal', data.message || 'Gagal mereset data.', 'error');
                            }
                        })
                        .catch(error => {
                            Swal.close();
                            console.error('Error resetting data:', error);
                            Swal.fire('Gagal', 'Terjadi kesalahan saat mereset data.', 'error');
                        });
                    }
                });
            });
        }

        // Save Min Stock functionality
        document.addEventListener('click', function(e) {
            if (e.target && e.target.classList.contains('save-min-stock')) {
                const button = e.target;
                const itemId = button.getAttribute('data-item-id');
                const input = document.querySelector(`.min-stock-input[data-item-id="${itemId}"]`);
                const minStock = input.value;

                button.disabled = true;
                const originalIcon = button.innerHTML;
                button.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';

                fetch('/api/update-min-stock/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ item_id: itemId, min_stock: minStock })
                })
                .then(response => response.json())
                .then(data => {
                    button.disabled = false;
                    button.innerHTML = originalIcon;
                    if (data.status === 'success') {
                        if (toast && toastMessage) {
                            toastMessage.textContent = 'Stok minimum berhasil disimpan.';
                            toastEl.classList.remove('bg-danger');
                            toastEl.classList.add('bg-success', 'text-white');
                            toast.show();
                        }
                    } else {
                        if (toast && toastMessage) {
                            toastMessage.textContent = data.message || 'Gagal menyimpan stok minimum.';
                            toastEl.classList.remove('bg-success');
                            toastEl.classList.add('bg-danger', 'text-white');
                            toast.show();
                        }
                    }
                })
                .catch(error => {
                    button.disabled = false;
                    button.innerHTML = originalIcon;
                    console.error('Error saving min stock:', error);
                    if (toast && toastMessage) {
                        toastMessage.textContent = 'Terjadi kesalahan jaringan.';
                        toastEl.classList.remove('bg-success');
                        toastEl.classList.add('bg-danger', 'text-white');
                        toast.show();
                    }
                });
            }
        });

        // Delete Min Stock functionality
        document.addEventListener('click', function(e) {
            if (e.target && e.target.classList.contains('delete-min-stock')) {
                const button = e.target;
                const itemId = button.getAttribute('data-item-id');
                const input = document.querySelector(`.min-stock-input[data-item-id="${itemId}"]`);

                button.disabled = true;
                const originalIcon = button.innerHTML;
                button.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';

                fetch('/api/delete-min-stock/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ item_id: itemId })
                })
                .then(response => response.json())
                .then(data => {
                    button.disabled = false;
                    button.innerHTML = originalIcon;
                    if (data.status === 'success') {
                        input.value = ''; // Clear the input field
                        if (toast && toastMessage) {
                            toastMessage.textContent = 'Stok minimum berhasil dihapus.';
                            toastEl.classList.remove('bg-danger');
                            toastEl.classList.add('bg-success', 'text-white');
                            toast.show();
                        }
                    } else {
                        if (toast && toastMessage) {
                            toastMessage.textContent = data.message || 'Gagal menghapus stok minimum.';
                            toastEl.classList.remove('bg-success');
                            toastEl.classList.add('bg-danger', 'text-white');
                            toast.show();
                        }
                    }
                })
                .catch(error => {
                    button.disabled = false;
                    button.innerHTML = originalIcon;
                    console.error('Error deleting min stock:', error);
                    if (toast && toastMessage) {
                        toastMessage.textContent = 'Terjadi kesalahan jaringan.';
                        toastEl.classList.remove('bg-success');
                        toastEl.classList.add('bg-danger', 'text-white');
                        toast.show();
                    }
                });
            }
        });

        // Delete Item button click handler (using event delegation)
        document.addEventListener("click", function(e) {
            const deleteBtn = e.target.closest(".delete-item-btn");
            if (deleteBtn) {
                const button = deleteBtn;
                const itemId = button.getAttribute("data-item-id");
                const row = button.closest("tr");
                const itemNameElement = row.querySelector("td:nth-child(3)"); // Assuming Name is 3rd column
                const itemName = itemNameElement ? itemNameElement.textContent.trim() : "item ini";

                Swal.fire({
                    title: "Konfirmasi Hapus",
                    text: `Apakah Anda yakin ingin menghapus item \"${itemName}\"? Tindakan ini tidak dapat dibatalkan.`,
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonColor: "#d33",
                    cancelButtonColor: "#3085d6",
                    confirmButtonText: "Ya, Hapus!",
                    cancelButtonText: "Batal"
                }).then((result) => {
                    if (result.isConfirmed) {
                        Swal.fire({ title: "Menghapus item...", allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                        fetch(`/api/delete-item/${itemId}/`, {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "X-CSRFToken": csrfToken
                            },
                            // No body needed if just using URL parameter for ID
                        })
                        .then(response => response.json())
                        .then(data => {
                            Swal.close();
                            if (data.status === "success") {
                                row.style.transition = "opacity 0.5s ease";
                                row.style.opacity = "0";
                                setTimeout(() => {
                                    row.remove();
                                    // Check if table is empty and add "no data" row if needed
                                    const tableBody = document.querySelector("table tbody");
                                    if (tableBody && tableBody.querySelectorAll("tr").length === 0) {
                                        const noDataRow = document.createElement("tr");
                                        noDataRow.innerHTML = "<td colspan=\"7\" class=\"text-center\">Tidak ada data barang</td>"; // Adjusted colspan
                                        tableBody.appendChild(noDataRow);
                                    }
                                    updateSendButtonState(); // Update button state after delete
                                }, 500);
                                Swal.fire("Berhasil", "Item berhasil dihapus", "success");
                            } else {
                                Swal.fire("Gagal", data.message || "Gagal menghapus item", "error");
                            }
                        })
                        .catch(error => {
                            console.error("Error deleting item:", error);
                            Swal.close();
                            Swal.fire("Gagal", "Terjadi kesalahan saat menghubungi server", "error");
                        });
                    }
                });
            }
        });
    });
</script>
{% endblock %}
